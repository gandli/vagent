name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

  musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binaries
        run: cargo build --release --target x86_64-unknown-linux-musl --bins -p vagent -p vagent-api
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vagent-musl
          path: target/x86_64-unknown-linux-musl/release/vagent*

  validate:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
      - name: Build
        run: cargo build --release --bins
      - name: Download xray-core
        run: |
          VER="v1.8.23"
          curl -fsSL -o xray.zip "https://github.com/XTLS/Xray-core/releases/download/${VER}/Xray-linux-64.zip"
          unzip -oq xray.zip -d xray-bin
          cp xray-bin/xray /usr/local/bin/xray && chmod +x /usr/local/bin/xray
          echo "xray $VER"
      - name: Download sing-box
        run: |
          SVER="v1.10.0"
          # 资产名无 v 前缀
          curl -fsSL -o sb.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${SVER}/sing-box-${SVER#v}-linux-amd64.tar.gz"
          tar xzf sb.tar.gz
          mv sing-box-*/sing-box ./sing-box-bin 2>/dev/null || true
          echo "sing-box $SVER"
      - name: Default config path (no-root, ~/.config/vagent)
        run: |
          rm -rf "$HOME/.config/vagent"
          # 首跑:无 config 时菜单引导生成默认 spec(非交互优雅退出)
          ./target/release/vagent </dev/null
          test -f "$HOME/.config/vagent/spec.toml" && echo "DEFAULT PATH OK: $HOME/.config/vagent/spec.toml"
      - name: Render + validate xray config
        run: |
          # 生成默认 spec(非交互首跑)+ 生成 Reality 密钥 + 渲染 xray
          ./target/release/vagent --config /tmp/spec.toml </dev/null
          ./target/release/vagent --reality-gen --config /tmp/spec.toml
          ./target/release/vagent --render xray --config /tmp/spec.toml > /tmp/xray.json
          ./xray-bin/xray run -test -config /tmp/xray.json && echo "XRAY CONFIG OK"
      # sing-box 渲染正确性由 core crate 单测(SingboxCore::render)覆盖;
      # 非交互环境下无法用菜单添加 tuic 用户,故不在此做端到端加载验证。

  release:
    runs-on: ubuntu-latest
    needs: [test, musl]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binaries
        run: cargo build --release --target x86_64-unknown-linux-musl --bins -p vagent -p vagent-api
      - name: Tag + Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "vagent $TAG" \
            --notes "Automated musl static release." \
            target/x86_64-unknown-linux-musl/release/vagent \
            target/x86_64-unknown-linux-musl/release/vagent-api
          echo "released $TAG"
