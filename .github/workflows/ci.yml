name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Supply-chain audit (cargo-audit.toml ignore 传递依赖 unmaintained)
        run: cargo audit

  musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binaries
        run: cargo build --release --target x86_64-unknown-linux-musl --bins -p vagent -p vagent-api
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vagent-musl
          path: target/x86_64-unknown-linux-musl/release/vagent*

  validate:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
      - name: Build
        run: cargo build --release --bins
      - name: Default config path (no-root, ~/.config/vagent)
        run: |
          rm -rf "$HOME/.config/vagent"
          # 零参数首跑:无 config 时菜单引导生成默认 spec(非交互优雅退出)
          ./target/release/vagent </dev/null
          test -f "$HOME/.config/vagent/spec.toml" && echo "DEFAULT PATH OK: $HOME/.config/vagent/spec.toml"
      - name: Config via VAGENT_CONFIG env
        run: |
          # 配置路径也可经环境变量指定(零命令行参数)
          rm -rf /tmp/vagent-ci
          VAGENT_CONFIG=/tmp/vagent-ci/spec.toml ./target/release/vagent </dev/null
          test -f /tmp/vagent-ci/spec.toml && echo "VAGENT_CONFIG OK: /tmp/vagent-ci/spec.toml"
      - name: Version flag
        run: ./target/release/vagent --version && echo "VERSION OK"
      - name: Menu interaction flow (add user + subscribe via VAGENT_TEST_INPUT)
        run: |
          rm -rf /tmp/vagent-ci-menu
          export VAGENT_CONFIG=/tmp/vagent-ci-menu/spec.toml
          export VAGENT_TEST_INPUT=$'NONE\n5\n0\nalice\n8443\n0\n4\n9\n0\n2\n15\n'
          # 首跑:multi_select 消费 NONE(不选协议,生成最小默认 spec);主菜单:5用户 → 0新增 → alice/8443/0(vless) → 4返回 → 9订阅 → 0生成 → 2返回 → 15退出
          ./target/release/vagent </dev/null
          grep -q 'name = "alice"' "$VAGENT_CONFIG" && echo "MENU FLOW OK: alice added via interactive menu"

  release:
    runs-on: ubuntu-latest
    needs: [test, musl]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write   # 允许 gh release create 推送 tag + 发布
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binaries
        run: cargo build --release --target x86_64-unknown-linux-musl --bins -p vagent -p vagent-api
      - name: Tag + Release (语义化版本,去重)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 用 workspace 版本做标签(vX.Y.Z),而非时间戳,便于更新检查比对
          VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          TAG="v${VERSION}"
          # 已存在该版本 release 则跳过(不重复发)
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG 已存在,跳过"
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "vagent $TAG" \
            --notes "Automated musl static release (v${VERSION})." \
            target/x86_64-unknown-linux-musl/release/vagent \
            target/x86_64-unknown-linux-musl/release/vagent-api
          echo "released $TAG"
