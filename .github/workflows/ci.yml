name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

  musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binaries
        run: cargo build --release --target x86_64-unknown-linux-musl --bins -p vagent -p vagent-api
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vagent-musl
          path: target/x86_64-unknown-linux-musl/release/vagent*

  validate:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --bins
      - name: Download xray-core
        run: |
          VER="v1.8.23"
          curl -sL -o xray.zip "https://github.com/XTLS/Xray-core/releases/download/${VER}/Xray-linux-64.zip"
          unzip -oq xray.zip -d xray-bin
          cp xray-bin/xray /usr/local/bin/xray && chmod +x /usr/local/bin/xray
          echo "xray $VER"
      - name: Download sing-box
        run: |
          SVER="v1.10.0"
          curl -sL -o sb.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${SVER}/sing-box-${SVER}-linux-amd64.tar.gz"
          tar xzf sb.tar.gz
          mv sing-box-*/sing-box ./sing-box-bin 2>/dev/null || true
          echo "sing-box $SVER"
      - name: Render + validate xray config
        run: |
          ./target/release/vagent init --domain example.com --config /tmp/spec.toml
          ./target/release/vagent user-add alice --config /tmp/spec.toml
          ./target/release/vagent reality-gen --config /tmp/spec.toml || true
          ./target/release/vagent render --core xray --out /tmp/xray.json --config /tmp/spec.toml
          ./xray-bin/xray run -test -config /tmp/xray.json && echo "XRAY CONFIG OK"
      - name: Render + validate sing-box config (tuic user)
        run: |
          ./target/release/vagent user-add t --protocol tuic --port 9443 --config /tmp/spec.toml
          mkdir -p /etc/vagent/certs
          openssl req -x509 -newkey rsa:2048 -nodes -keyout /etc/vagent/certs/example.com.key -out /etc/vagent/certs/example.com.cer -days 365 -subj "/CN=example.com"
          ./target/release/vagent render --core singbox --out /tmp/sb.json --config /tmp/spec.toml
          ./sing-box-bin check -c /tmp/sb.json && echo "SING-BOX CONFIG OK"

  release:
    runs-on: ubuntu-latest
    needs: [test, musl]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binaries
        run: cargo build --release --target x86_64-unknown-linux-musl --bins -p vagent -p vagent-api
      - name: Tag + Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "vagent $TAG" \
            --notes "Automated musl static release." \
            target/x86_64-unknown-linux-musl/release/vagent \
            target/x86_64-unknown-linux-musl/release/vagent-api
          echo "released $TAG"
